<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuLens AI - Premium Document Analysis</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        background: '#0B0D17',
                        surface: 'rgba(255, 255, 255, 0.03)',
                        surfaceHover: 'rgba(255, 255, 255, 0.08)',
                        border: 'rgba(255, 255, 255, 0.1)',
                        primary: '#4361EE',
                        accent: '#4CC9F0',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-card {
                @apply bg-surface backdrop-blur-xl border border-border shadow-2xl;
            }
        }
        body {
            margin: 0;
            background-color: #0B0D17;
            color: #ffffff;
        }
        /* Custom animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes floatShape {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .animate-floating { animation: floatShape 8s ease-in-out infinite; }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-modal-fade { animation: modalFadeIn 0.3s ease-out forwards; }
    </style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased min-h-screen w-full flex">
    <div id="root" class="w-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom SVG Icons
        const IconUploadCloud = () => (<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>);
        const IconFileText = ({size=20}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>);
        const IconSparkles = ({size=16, className=""}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>);
        const IconFile = ({size=32}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>);
        const IconAlertCircle = ({size=14}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>);
        const IconLoader2 = ({size=48, className=""}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>);
        const IconHelpCircle = ({size=18}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>);
        const IconListChecks = ({size=20}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>);
        const IconAlertTriangle = ({size=20}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>);
        const IconCheckSquare = ({size=20}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>);
        const IconRefreshCcw = ({size=16}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>);
        const IconX = ({size=20}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>);
        const IconUser = ({size=20}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>);
        const IconBookOpen = ({size=20}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>);
        const IconHeartSolid = ({size=16}) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>);
        
        // ProgressMeter Component
        const ProgressMeter = ({ score }) => {
            const [currentScore, setCurrentScore] = useState(0);
            
            useEffect(() => {
                const t = setTimeout(() => setCurrentScore(score), 300);
                return () => clearTimeout(t);
            }, [score]);

            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (currentScore / 100) * circumference;
            
            let colorClass = 'text-green-500';
            if (currentScore > 33) colorClass = 'text-yellow-500';
            if (currentScore > 66) colorClass = 'text-red-500';

            return (
                <div className="flex flex-col items-center">
                    <div className="relative w-24 h-24 flex items-center justify-center">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 80 80">
                            <circle cx="40" cy="40" r={radius} stroke="currentColor" strokeWidth="8" fill="transparent" className="text-surfaceHover" />
                            <circle cx="40" cy="40" r={radius} stroke="currentColor" strokeWidth="8" fill="transparent" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" className={`${colorClass} transition-all duration-1000 ease-out`} />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                            <span className="text-2xl font-bold">{currentScore}</span>
                        </div>
                    </div>
                    <span className="text-xs text-white/50 mt-2 font-medium uppercase tracking-wider text-center">Document<br/>Risk Score</span>
                </div>
            );
        };

        // RiskBadge Component
        const RiskBadge = ({ level }) => {
            const styles = { high: 'bg-red-500/10 text-red-400 border-red-500/20', medium: 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20', low: 'bg-green-500/10 text-green-400 border-green-500/20' };
            const labels = { high: '🔴 High Risk', medium: '🟡 Medium Risk', low: '🟢 Low Risk' };
            const riskKey = level.toLowerCase();
            return <span className={`px-2 py-1 text-xs font-semibold rounded-md border ${styles[riskKey]}`}>{labels[riskKey]}</span>;
        };

        // ClauseItem Component
        const ClauseItem = ({ title, text, highlight, onExplain }) => (
            <div className="flex flex-col gap-2 p-4 rounded-xl hover:bg-surfaceHover border border-transparent hover:border-border transition-colors group relative">
                <div className="flex items-start justify-between gap-4">
                    <div>
                        <h4 className="font-semibold text-white mb-1 group-hover:text-primary transition-colors flex items-center gap-2">
                            {title}
                            {highlight && <span className="bg-red-500/20 text-red-400 text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider font-bold">Important</span>}
                        </h4>
                        <p className="text-sm text-white/70 leading-relaxed">{text}</p>
                    </div>
                    <button onClick={onExplain} className="shrink-0 p-2 text-white/40 hover:text-accent hover:bg-accent/10 rounded-lg transition-colors flex items-center gap-1" title="Explain this clause">
                        <IconHelpCircle size={18} />
                        <span className="text-xs font-medium hidden sm:inline">Explain</span>
                    </button>
                </div>
            </div>
        );

        // ModalPopup Component
        const ModalPopup = ({ isOpen, onClose, clause }) => {
            if (!isOpen || !clause) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div onClick={onClose} className="absolute inset-0 bg-background/80 backdrop-blur-sm"></div>
                    <div className="animate-modal-fade relative w-full max-w-lg glass-card rounded-2xl overflow-hidden shadow-2xl">
                        <div className="flex items-center justify-between p-4 border-b border-border bg-surfaceHover">
                            <div className="flex items-center gap-2 text-accent">
                                <IconSparkles size={18} />
                                <span className="font-display font-semibold tracking-wide text-sm">AI Explanation</span>
                            </div>
                            <button onClick={onClose} className="text-white/50 hover:text-white transition-colors p-1"><IconX size={20} /></button>
                        </div>
                        <div className="p-6">
                            <h3 className="font-semibold text-lg mb-2">{clause.title}</h3>
                            <div className="bg-surface p-4 rounded-xl border border-border mb-6">
                                <p className="text-sm font-medium text-white/50 mb-1">Original Text:</p>
                                <p className="text-sm text-white/80 italic">"{clause.text}"</p>
                            </div>
                            <div>
                                <p className="text-sm font-medium text-white/50 mb-2">Plain English:</p>
                                <p className="text-white/90 leading-relaxed text-base">{clause.explanation}</p>
                            </div>
                        </div>
                        <div className="bg-surface/50 border-t border-border p-4 flex justify-end">
                            <button onClick={onClose} className="bg-primary hover:bg-primary/90 text-white px-6 py-2 rounded-lg text-sm font-medium transition-colors">Got it</button>
                        </div>
                    </div>
                </div>
            );
        };

        // UploadCard Component
        const UploadCard = ({ isAnalyzing, onAnalyze }) => {
            const { useRef } = React;
            const [uploadMode, setUploadMode] = useState('file');
            const [hasFile, setHasFile] = useState(false);
            const [textInput, setTextInput] = useState('');
            const [fileName, setFileName] = useState('');
            const fileInputRef = useRef(null);
            
            const loadingMessages = ["Scanning document...", "Extracting clauses...", "Analyzing risks..."];
            const [messageIndex, setMessageIndex] = useState(0);

            useEffect(() => {
                if (isAnalyzing) {
                    const interval = setInterval(() => setMessageIndex((prev) => (prev + 1) % loadingMessages.length), 1200);
                    return () => clearInterval(interval);
                }
            }, [isAnalyzing]);

            const handleFileChange = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    setHasFile(true);
                    setFileName(e.target.files[0].name);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    setHasFile(true);
                    setFileName(e.dataTransfer.files[0].name);
                }
            };

            return (
                <div className="animate-fade-in max-w-4xl w-full mx-auto pb-8 relative">
                    <div className="absolute top-10 left-10 w-24 h-24 bg-primary/20 blur-3xl rounded-full animate-floating" />
                    <div className="absolute bottom-40 right-10 w-32 h-32 bg-accent/20 blur-3xl rounded-full animate-floating" style={{animationDelay: '1.5s'}} />
                    
                    <div className="max-w-2xl mx-auto shadow-2xl relative z-10">
                        <div className="text-center mb-10">
                            <div className="inline-block mb-3 px-4 py-1.5 rounded-full bg-gradient-to-r from-primary/20 to-accent/20 border border-primary/30 backdrop-blur-md animate-fade-in shadow-[0_0_15px_rgba(67,97,238,0.2)]">
                                <span className="text-sm font-medium tracking-wide bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">AI-Powered Legal Analysis</span>
                            </div>
                            <h1 className="text-5xl md:text-6xl font-display font-bold mb-6 tracking-tight bg-gradient-to-br from-white via-white to-white/40 bg-clip-text text-transparent transform transition-all hover:scale-[1.02] duration-500">
                                Understand Legal Docs<br/>
                                <span className="bg-gradient-to-r from-primary via-[#8A2BE2] to-accent bg-clip-text text-transparent">Instantly.</span>
                            </h1>
                            <p className="text-white/70 text-lg md:text-xl max-w-2xl mx-auto font-light leading-relaxed">
                                Upload a contract, agreement, or notice. Our AI will instantly isolate risks, summarize clauses, and suggest next steps with pinpoint accuracy.
                            </p>
                        </div>

                        <div className="glass-card rounded-2xl p-6 relative overflow-hidden transition-all duration-300 min-h-[400px] flex flex-col justify-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-white/10">
                        {!isAnalyzing ? (
                            <div className="animate-fade-in">
                                <div className="flex gap-4 mb-6 border-b border-border/50 pb-4">
                                    <button onClick={() => setUploadMode('file')} className={`flex-1 text-sm font-medium pb-2 transition-all duration-300 ${uploadMode === 'file' ? 'text-primary border-b-2 border-primary shadow-[0_4px_10px_rgba(67,97,238,0.3)]' : 'text-white/50 hover:text-white/80'}`}>Upload File</button>
                                    <button onClick={() => setUploadMode('text')} className={`flex-1 text-sm font-medium pb-2 transition-all duration-300 ${uploadMode === 'text' ? 'text-primary border-b-2 border-primary shadow-[0_4px_10px_rgba(67,97,238,0.3)]' : 'text-white/50 hover:text-white/80'}`}>Paste Text instead</button>
                                </div>

                                {uploadMode === 'file' ? (
                                    <div 
                                        className={`border-2 border-dashed rounded-2xl p-12 text-center transition-all duration-300 relative group overflow-hidden ${hasFile ? 'bg-gradient-to-b from-surfaceHover to-surface border-primary/50 shadow-[0_0_30px_rgba(67,97,238,0.15)]' : 'border-border/60 hover:border-primary/50 bg-surface/30'}`}
                                        onDragOver={(e) => e.preventDefault()}
                                        onDrop={handleDrop}
                                    >
                                        <div className="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-xl pointer-events-none" />
                                        {hasFile ? (
                                            <div className="flex flex-col items-center relative z-10 animate-fade-in">
                                                <div className="w-20 h-20 bg-gradient-to-br from-primary/20 to-accent/20 text-primary rounded-full flex items-center justify-center mb-5 shadow-[0_0_20px_rgba(67,97,238,0.2)] ring-4 ring-primary/10">
                                                    <IconFile size={36} className="drop-shadow-md text-primary" />
                                                </div>
                                                <p className="font-display font-medium text-xl text-white mb-2">{fileName || 'document.pdf'}</p>
                                                <p className="text-sm text-white/50 mt-1">Ready for analysis</p>
                                                <button onClick={() => setHasFile(false)} className="text-xs text-red-400 mt-4 underline underline-offset-2 hover:text-red-300 transition-colors">Remove file</button>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center relative z-10 animate-fade-in">
                                                <div className="w-20 h-20 bg-surface/80 border border-border/50 text-white/50 rounded-full flex items-center justify-center mb-5 shadow-inner transition-all duration-300 group-hover:text-primary group-hover:border-primary/30 group-hover:bg-primary/5 group-hover:scale-110">
                                                    <IconUploadCloud size={36} />
                                                </div>
                                                <p className="font-display font-medium text-xl mb-2 text-white/90">Drag & drop your document</p>
                                                <p className="text-sm text-white/40 mb-8 max-w-[250px] mx-auto">Supports PDF, DOCX, and Text files up to 50MB</p>
                                                
                                                <input 
                                                    type="file" 
                                                    ref={fileInputRef} 
                                                    onChange={handleFileChange} 
                                                    className="hidden" 
                                                    accept=".pdf,.doc,.docx,.txt"
                                                />
                                                <button onClick={() => fileInputRef.current?.click()} className="bg-white text-background font-medium px-6 py-2.5 rounded-full text-sm hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:scale-105 transition-all duration-300 flex items-center gap-2">
                                                    Browse Files
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="w-full relative group animate-fade-in">
                                        <div className="absolute inset-0 bg-gradient-to-r from-primary/10 to-accent/10 rounded-xl blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500" />
                                        <textarea value={textInput} onChange={(e) => setTextInput(e.target.value)} className="w-full h-48 bg-surface/50 backdrop-blur-md border border-border/80 rounded-xl p-5 text-sm text-white/90 placeholder:text-white/30 focus:outline-none focus:border-primary/70 focus:ring-1 focus:ring-primary/50 resize-none transition-all relative z-10 shadow-inner" placeholder="Paste your legal text here... Our engine will process it just like a document." />
                                    </div>
                                )}

                                <div className="mt-8 flex flex-col sm:flex-row gap-4">
                                    <button 
                                        onClick={() => onAnalyze(fileInputRef.current?.files?.[0], textInput)} 
                                        disabled={!hasFile && !textInput.trim()}
                                        className="flex-1 bg-gradient-to-r from-primary to-accent hover:opacity-90 text-white font-medium py-3.5 rounded-xl transition-all duration-300 shadow-[0_0_20px_rgba(67,97,238,0.4)] hover:shadow-[0_0_30px_rgba(67,97,238,0.6)] disabled:opacity-50 disabled:shadow-none disabled:cursor-not-allowed group relative overflow-hidden flex items-center justify-center gap-2 hover:-translate-y-0.5"
                                    >
                                        <IconSparkles size={18} />
                                        Analyze Document
                                    </button>
                                    <button onClick={() => onAnalyze(null, null)} className="flex-1 bg-surface hover:bg-surfaceHover border border-border text-white font-medium py-3.5 rounded-xl transition-all duration-300 hover:border-white/20 hover:shadow-lg hover:-translate-y-0.5">Try Sample Document</button>
                                </div>
                                <div className="mt-4 flex items-center justify-center gap-2 text-xs text-white/40">
                                    <IconAlertCircle size={14} />
                                    <span>DocuLens AI analyzes documents but does not constitute legal advice.</span>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-fade-in flex flex-col items-center justify-center py-20">
                                <IconLoader2 size={48} className="text-primary animate-spin mb-6" />
                                <p className="text-lg font-medium text-white/80 animate-fade-in">{loadingMessages[messageIndex]}</p>
                                <div className="w-48 h-1 bg-surfaceHover rounded-full mt-6 overflow-hidden">
                                    <div className="h-full bg-gradient-to-r from-primary to-accent transition-all duration-1000 shadow-[0_0_10px_rgba(67,97,238,0.8)]" style={{ width: `${((messageIndex + 1) / loadingMessages.length) * 100}%` }}></div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
                    
                    {!isAnalyzing && (
                        <div className="mt-12 grid sm:grid-cols-3 gap-6 animate-fade-in relative z-10 w-full mb-8 px-4 sm:px-0">
                            <div className="glass-card p-6 rounded-2xl flex flex-col items-center text-center group hover:-translate-y-2 hover:shadow-[0_15px_30px_rgba(67,97,238,0.2)] hover:border-primary/50 transition-all duration-300">
                                <div className="w-14 h-14 bg-gradient-to-br from-primary/20 to-primary/5 rounded-full flex items-center justify-center text-primary mb-5 group-hover:scale-110 transition-transform ring-1 ring-primary/20 shadow-inner">
                                    <IconSparkles size={24} />
                                </div>
                                <h4 className="font-display font-semibold text-white mb-2 text-lg">Lightning Fast AI</h4>
                                <p className="text-sm text-white/60 leading-relaxed">Processes 100-page contracts in under 5 seconds with surgical precision.</p>
                            </div>

                    <div className="fixed bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-accent/20 blur-[120px] pointer-events-none" />
                    
                    <header className="w-full relative z-10 border-b border-border bg-background/50 backdrop-blur-md sticky top-0">
                        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('home')}>
                                    <div className="bg-primary/20 p-2 rounded-lg text-primary"><IconFileText size={20} /></div>
                                    <span className="font-display font-bold text-xl tracking-wide hidden sm:block">DocuLens AI</span>
                                    <div className={`ml-2 w-2 h-2 rounded-full hidden sm:block shadow-lg ${backendStatus === 'online' ? 'bg-green-500 shadow-green-500/50' : 'bg-red-500 shadow-red-500/50'}`} title={`Backend API is ${backendStatus}`} />
                                </div>
                                <nav className="hidden md:flex items-center gap-4 text-sm font-medium text-white/60">
                                    <button onClick={() => setCurrentView('home')} className={`hover:text-white transition-colors ${currentView === 'home' ? 'text-white' : ''}`}>Scanner</button>
                                    <button onClick={() => setCurrentView('blog')} className={`hover:text-white transition-colors ${currentView === 'blog' ? 'text-white' : ''} flex items-center gap-1`}>
                                        <IconBookOpen size={16} /> Insights
                                    </button>
                                </nav>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <button onClick={() => setCurrentView('pricing')} className={`flex items-center gap-2 text-sm font-medium transition-colors hover:shadow-[0_0_15px_rgba(76,201,240,0.3)] px-4 py-2 rounded-full border ${currentView === 'pricing' ? 'bg-accent/10 border-accent/30 text-accent' : 'bg-surfaceHover border-border text-white/80'}`}>
                                    <IconSparkles size={16} className="text-accent" />
                                    <span className="hidden sm:inline">Upgrade to Pro</span>
                                    <span className="sm:hidden">Pro</span>
                                </button>
                                
                                <button onClick={() => setCurrentView('profile')} className={`w-9 h-9 rounded-full flex items-center justify-center transition-all bg-surface hover:bg-surfaceHover border border-border ${currentView === 'profile' ? 'ring-2 ring-primary ring-offset-2 ring-offset-background' : ''}`}>
                                    <IconUser size={18} className="text-white/80" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-7xl mx-auto p-6 relative z-10 flex flex-col pt-8 md:pt-12 pb-16">
                        {renderContent()}
                    </main>

                    {/* Footer */}
                    <footer className="relative z-10 w-full border-t border-border/50 py-8 bg-surface/50 backdrop-blur-md mt-auto">
                        <div className="max-w-7xl mx-auto px-6 flex flex-col items-center justify-center gap-3">
                            <div className="flex items-center gap-2 text-sm font-medium tracking-wide bg-surface/80 px-8 py-3 rounded-full border border-primary/30 shadow-[0_4px_20px_rgba(67,97,238,0.15)]">
                                <span className="bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">Made with love by Hina & Dhruv</span>
                                <span className="text-accent animate-pulse ml-1 drop-shadow-[0_0_10px_rgba(76,201,240,0.6)]"><IconHeartSolid size={18}/></span>
                            </div>
                            <p className="text-xs text-white/40 mt-2">© 2026 DocuLens AI. All rights strictly reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
